# MVP – LOTR TCG shop (traitement images + génération CSV eBay)

currency: CAD

marketplaces:
  default: "ebay.com"
  additional:
    - "ebay.ca"
    - "ebay.fr"
  language_rules:
    ebay.com: en
    ebay.ca: en
    ebay.fr: fr
  pricing:
    identical_across_sites: true

# Coordonnées de crop, taille cible, qualité (MVP)
images:
  output_size_px: 1600
  jpeg_quality: 90
  color_space: sRGB
  background: white
  recto_suffix: "_recto.jpg"
  verso_suffix: "_verso.jpg"
  # Zone de crop en pixels (optionnel). Utilisé par process_images et crop_upload_images.
  # Si margin > 0 : enlève N pixels de chaque côté (gauche, haut, droite, bas).
  # Sinon si width/height > 0 : rectangle (left, top, width, height).
  crop:
    margin: 100
    left: 0
    top: 0
    width: 0
    height: 0

sku:
  pattern: "LOTR-<SET>-<NUM>-<QUAL>"
  qualifiers_order:
    - foil_flag
    - condition
    - language
  languages_allowed:
    - EN
    - FR
    - DE
    - IT
    - ES

paths:
  input_raw: "input_raw"
  processed: "processed"
  data: "data"
  templates: "templates"

cloudinary:
  enabled: true
  cloud_name: ""
  api_key: ""
  api_secret: ""

ebay_api:
  environment: sandbox  # or production
  app_id: ""
  cert_id: ""
  dev_id: ""
  auth_token: ""
  # Synchro annonces : category_id = feuille « Trading Card Games > Lord of the Rings » (voir GetCategories)
  # Ex. ebay.com ~ 2536, ebay.ca / ebay.fr : vérifier sur le site ou via API
  listing:
    category_id:
      ebay.com: "2536"
      ebay.ca: "2536"
      ebay.fr: "2536"
    duration: "GTC"  # GoodTillCancelled, ou 3, 5, 7, 10, 30 jours
    condition_id: "1000"  # 1000 = New (Near Mint), adapter si besoin
